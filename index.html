<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Bouncy Ball - Particle Dash</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; font-family: sans-serif; overflow: hidden; }
        canvas { background: linear-gradient(#1e3c72, #2a5298); border: 4px solid #fff; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameOver = false;
        let gameSpeed = 6; 
        let spawnTimer = 0;
        let rotationAngle = 0;

        const gravity = 0.6;
        const player = { x: 150, y: 330, radius: 20, dy: 0, jumpForce: -12, onGround: false };
        const obstacles = [];
        const particles = []; // Taulukko partikkeleille

        // Partikkeli-luokka efektien luomiseen
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() * -2) - 1; // Liikkuu taaksepäin
                this.speedY = (Math.random() * 2) - 1;
                this.color = color;
                this.life = 1.0; // Elinaika (alpha)
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02; // Partikkeli haalistuu
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function spawnObstacle() {
            const height = 40 + Math.random() * 35;
            obstacles.push({ x: canvas.width, width: 30, height: height });
            spawnTimer = Math.floor(40 + Math.random() * 50); 
        }

        function jump() { 
            if (player.onGround && !gameOver) { 
                player.dy = player.jumpForce; 
                player.onGround = false; 
                // Lisätään hyppy-partikkeleita
                for(let i=0; i<8; i++) particles.push(new Particle(player.x, player.y + 20, "#fff"));
            } 
            else if (gameOver) { resetGame(); }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("mousedown", jump);

        function resetGame() { 
            obstacles.length = 0; particles.length = 0; score = 0; gameSpeed = 6; 
            player.y = 330; player.dy = 0; rotationAngle = 0; gameOver = false; 
            update(); 
        }

        function update() {
            if (gameOver) return;

            player.dy += gravity; 
            player.y += player.dy;

            if (player.y > 370 - player.radius) { 
                player.y = 370 - player.radius; 
                player.dy = 0; 
                player.onGround = true; 
            }

            rotationAngle += (gameSpeed * 0.04);

            // Luodaan partikkeleita pallon perään jatkuvasti
            if (Math.random() > 0.3) {
                const pColor = player.onGround ? "rgba(255,255,255,0.5)" : "#f1c40f";
                particles.push(new Particle(player.x - 10, player.y + (Math.random()*20 - 10), pColor));
            }

            // Päivitä partikkelit
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            spawnTimer--;
            if (spawnTimer <= 0) spawnObstacle();

            gameSpeed = 6 + (score * 0.05);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                let closestX = Math.max(obstacles[i].x, Math.min(player.x, obstacles[i].x + obstacles[i].width));
                let closestY = Math.max(370 - obstacles[i].height, Math.min(player.y, 370));
                let dx = player.x - closestX;
                let dy = player.y - closestY;

                if ((dx * dx + dy * dy) < (player.radius * player.radius)) gameOver = true;
                if (obstacles[i].x + obstacles[i].width < 0) { obstacles.splice(i, 1); score++; }
            }

            draw(); 
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Lattia
            ctx.fillStyle = "#1a2a3a"; 
            ctx.fillRect(0, 370, canvas.width, 30);
            
            // Piirrä partikkelit
            particles.forEach(p => p.draw());

            // Pallo
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(rotationAngle);
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            // Pallon sisäinen risti pyörimistä varten
            ctx.strokeStyle = "#e67e22";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-player.radius, 0); ctx.lineTo(player.radius, 0);
            ctx.moveTo(0, -player.radius); ctx.lineTo(0, player.radius);
            ctx.stroke();
            ctx.restore();
            
            // Esteet
            ctx.fillStyle = "#e74c3c"; 
            obstacles.forEach(o => { ctx.fillRect(o.x, 370 - o.height, o.width, o.height); });

            ctx.fillStyle = "#fff"; 
            ctx.font = "bold 20px Arial"; 
            ctx.fillText("Pisteet: " + score, 20, 40);

            if (gameOver) { 
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.textAlign = "center"; 
                ctx.font = "32px Arial";
                ctx.fillText("PELI OHI!", canvas.width/2, canvas.height/2 - 10);
                ctx.font = "18px Arial";
                ctx.fillText("Paina Space", canvas.width/2, canvas.height/2 + 40);
            }
        }
        update();
    </script>
</body>
</html>
