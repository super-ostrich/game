<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Bouncy Ball 6.0</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: sans-serif; overflow: hidden; }
        canvas { background: linear-gradient(#3498db, #2980b9); border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameOver = false;
        let gameSpeed = 6; // Vauhti palautettu kuuteen
        let spawnTimer = 0;
        let rotation = 0;

        const gravity = 0.6;
        const player = { x: 150, y: 330, radius: 20, dy: 0, jumpForce: -12, onGround: false };
        const obstacles = [];

        function spawnObstacle() {
            const height = 40 + Math.random() * 25;
            obstacles.push({ x: canvas.width, width: 30, height: height });
            
            // Lasketaan minimiväli, jotta hyppy on aina mahdollinen nopeudella 6
            // 40 framea vauhdilla 6 = 240px väliä, mikä on reilu mutta haastava
            spawnTimer = Math.floor(35 + Math.random() * 45); 
        }

        function jump() { 
            if (player.onGround && !gameOver) { 
                player.dy = player.jumpForce; 
                player.onGround = false; 
            } 
            else if (gameOver) { resetGame(); }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("mousedown", jump);

        function resetGame() { 
            obstacles.length = 0; score = 0; gameSpeed = 6; spawnTimer = 60;
            player.y = 330; player.dy = 0; rotation = 0; gameOver = false; 
            update(); 
        }

        function update() {
            if (gameOver) return;

            player.dy += gravity; 
            player.y += player.dy;

            if (player.y > 370 - player.radius) { 
                player.y = 370 - player.radius; 
                player.dy = 0; 
                player.onGround = true; 
            }

            rotation += gameSpeed * 0.05;
            spawnTimer--;
            if (spawnTimer <= 0) spawnObstacle();

            // Nopeus kasvaa tästä eteenpäin
            gameSpeed = 6 + (score * 0.1);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                // Pallon törmäystarkistus
                let closestX = Math.max(obstacles[i].x, Math.min(player.x, obstacles[i].x + obstacles[i].width));
                let closestY = Math.max(370 - obstacles[i].height, Math.min(player.y, 370));
                let dx = player.x - closestX;
                let dy = player.y - closestY;

                if ((dx * dx + dy * dy) < (player.radius * player.radius)) {
                    gameOver = true;
                }

                if (obstacles[i].x + obstacles[i].width < 0) { 
                    obstacles.splice(i, 1); 
                    score++; 
                }
            }

            draw(); 
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Lattia
            ctx.fillStyle = "#2c3e50"; 
            ctx.fillRect(0, 370, canvas.width, 30);
            
            // Pallo
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(rotation);
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            // Pallon kuvio (pyörimisen näkemiseksi)
            ctx.strokeStyle = "#d35400";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-player.radius, 0); ctx.lineTo(player.radius, 0);
            ctx.stroke();
            ctx.restore();
            
            // Esteet
            ctx.fillStyle = "#e74c3c"; 
            obstacles.forEach(o => { ctx.fillRect(o.x, 370 - o.height, o.width, o.height); });

            ctx.fillStyle = "#fff"; 
            ctx.font = "bold 20px Arial"; 
            ctx.fillText("Pisteet: " + score, 20, 40);

            if (gameOver) { 
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.textAlign = "center"; 
                ctx.fillText("GAME OVER! Pisteet: " + score, canvas.width/2, canvas.height/2);
                ctx.font = "16px Arial";
                ctx.fillText("Paina välilyöntiä aloittaaksesi alusta", canvas.width/2, canvas.height/2 + 40);
            }
        }
        update();
    </script>
</body>
</html>
