<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>JS Geometry Dash - Reilu Haaste</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; font-family: sans-serif; overflow: hidden; }
        canvas { background: #3498db; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameOver = false;
        let gameSpeed = 6;
        let spawnTimer = 0;

        const gravity = 0.6;
        const player = { x: 100, y: 330, width: 40, height: 40, dy: 0, jumpForce: -12, onGround: false };
        const obstacles = [];

        function spawnObstacle() {
            // Arvotaan korkeus, mutta pidetään leveys vakiona
            const height = 40 + Math.random() * 30;
            obstacles.push({ x: canvas.width, width: 30, height: height });
            
            // Lasketaan minimietäisyys seuraavaan esteeseen (vähintään 120px + nopeuskerroin)
            // Tämä estää mahdottomat tuplat ja liian tiheät jonot
            spawnTimer = Math.floor(25 + Math.random() * 40); 
        }

        function jump() { 
            if (player.onGround && !gameOver) { 
                player.dy = player.jumpForce; 
                player.onGround = false; 
            } 
            else if (gameOver) { resetGame(); }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("mousedown", jump);

        function resetGame() { 
            obstacles.length = 0; 
            score = 0; 
            gameSpeed = 6;
            spawnTimer = 0;
            player.y = 330; 
            player.dy = 0; 
            gameOver = false; 
            update(); 
        }

        function update() {
            if (gameOver) return;

            // Pelaajan fysiikka
            player.dy += gravity; 
            player.y += player.dy;

            if (player.y > 330) { 
                player.y = 330; 
                player.dy = 0; 
                player.onGround = true; 
            }

            // Esteiden hallinta
            spawnTimer--;
            if (spawnTimer <= 0) {
                spawnObstacle();
            }

            // Pelin vaikeutuminen (nopeus nousee hitaasti)
            gameSpeed = 6 + (score * 0.1);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                // Törmäystarkistus (hieman armollisempi hitbox)
                if (player.x + 5 < obstacles[i].x + obstacles[i].width && 
                    player.x + player.width - 5 > obstacles[i].x && 
                    player.y + player.height > 370 - obstacles[i].height) { 
                    gameOver = true; 
                }

                // Poista menneet esteet ja lisää pisteitä
                if (obstacles[i].x + obstacles[i].width < 0) { 
                    obstacles.splice(i, 1); 
                    score++; 
                }
            }

            draw(); 
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Lattia
            ctx.fillStyle = "#2c3e50"; 
            ctx.fillRect(0, 370, canvas.width, 30);
            
            // Pelaaja
            ctx.fillStyle = "#f1c40f"; 
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Esteet
            ctx.fillStyle = "#e74c3c"; 
            obstacles.forEach(o => { 
                ctx.fillRect(o.x, 370 - o.height, o.width, o.height); 
            });

            // Käyttöliittymä
            ctx.fillStyle = "#fff"; 
            ctx.font = "bold 20px Arial"; 
            ctx.textAlign = "left";
            ctx.fillText("Pisteet: " + score, 20, 40);
            ctx.font = "14px Arial";
            ctx.fillText("Nopeus: " + gameSpeed.toFixed(1), 20, 65);

            if (gameOver) { 
                ctx.fillStyle = "rgba(0,0,0,0.7)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; 
                ctx.textAlign = "center"; 
                ctx.font = "30px Arial";
                ctx.fillText("PELI OHI!", canvas.width/2, canvas.height/2 - 20);
                ctx.font = "20px Arial";
                ctx.fillText("Klikkaa tai Space aloittaaksesi alusta.", canvas.width/2, canvas.height/2 + 30);
            }
        }

        update();
    </script>
</body>
</html>
