<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>JS Bouncy Ball - Reilu Haaste</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { background: #3498db; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameOver = false;
        let gameSpeed = 4.5; // Aloitetaan hitaammin (aiemmin 6)
        let spawnTimer = 100; // Alussa pidempi tauko

        const gravity = 0.55; // Hieman kevyempi painovoima
        const player = { 
            x: 150, 
            y: 330, 
            radius: 20, 
            dy: 0, 
            jumpForce: -11, 
            onGround: false 
        };
        const obstacles = [];

        function spawnObstacle() {
            const height = 30 + Math.random() * 30; // Alussa matalampia esteitä
            obstacles.push({ x: canvas.width, width: 25, height: height });
            
            // Spawn-väli on alussa suuri, mutta pienenee kun pisteitä kertyy
            // Varmistaa, ettei tule mahdottomia välejä
            let minGap = 40 + (100 / (1 + score * 0.1)); 
            spawnTimer = Math.floor(minGap + Math.random() * 50); 
        }

        function jump() { 
            if (player.onGround && !gameOver) { 
                player.dy = player.jumpForce; 
                player.onGround = false; 
            } 
            else if (gameOver) { resetGame(); }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("mousedown", jump);

        function resetGame() { 
            obstacles.length = 0; 
            score = 0; 
            gameSpeed = 4.5;
            spawnTimer = 100;
            player.y = 330; 
            player.dy = 0; 
            gameOver = false; 
            update(); 
        }

        function update() {
            if (gameOver) return;

            player.dy += gravity; 
            player.y += player.dy;

            // Pallo osuu maahan (370 on lattian yläreuna, vähennetään säde)
            if (player.y > 370 - player.radius) { 
                player.y = 370 - player.radius; 
                player.dy = 0; 
                player.onGround = true; 
            }

            spawnTimer--;
            if (spawnTimer <= 0) {
                spawnObstacle();
            }

            // Nopeus kasvaa hitaammin
            gameSpeed = 4.5 + (score * 0.08);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                // Pallon ja suorakulmion välinen törmäys
                let closestX = Math.max(obstacles[i].x, Math.min(player.x, obstacles[i].x + obstacles[i].width));
                let closestY = Math.max(370 - obstacles[i].height, Math.min(player.y, 370));
                
                let distanceX = player.x - closestX;
                let distanceY = player.y - closestY;
                let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                if (distanceSquared < (player.radius * player.radius)) {
                    gameOver = true;
                }

                if (obstacles[i].x + obstacles[i].width < 0) { 
                    obstacles.splice(i, 1); 
                    score++; 
                }
            }

            draw(); 
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Lattia
            ctx.fillStyle = "#2c3e50"; 
            ctx.fillRect(0, 370, canvas.width, 30);
            
            // Pallo (pelaaja)
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#f1c40f";
            ctx.fill();
            // Lisätään palloon pieni kiilto, jotta se näyttää 3D-mäisemmältä
            ctx.beginPath();
            ctx.arc(player.x - 5, player.y - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.fill();
            ctx.closePath();
            
            // Esteet (piikit/palikat)
            ctx.fillStyle = "#e74c3c"; 
            obstacles.forEach(o => { 
                ctx.fillRect(o.x, 370 - o.height, o.width, o.height); 
            });

            // UI
            ctx.fillStyle = "#fff"; 
            ctx.font = "bold 22px Arial"; 
            ctx.textAlign = "left";
            ctx.fillText("Pisteet: " + score, 20, 40);

            if (gameOver) { 
                ctx.fillStyle = "rgba(0,0,0,0.75)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; 
                ctx.textAlign = "center"; 
                ctx.font = "34px Arial";
                ctx.fillText("HÄVISIT!", canvas.width/2, canvas.height/2 - 20);
                ctx.font = "20px Arial";
                ctx.fillText("Pisteet: " + score + " - Paina Space aloittaaksesi.", canvas.width/2, canvas.height/2 + 30);
            }
        }

        update();
    </script>
</body>
</html>
